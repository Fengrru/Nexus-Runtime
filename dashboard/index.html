<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Runtime — Dashboard v1.0</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d2991d;
    --purple: #a371f7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 16px; color: var(--accent); }
  header .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--purple); color: #fff; }
  .layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 52px); }
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
  }
  .main { overflow-y: auto; padding: 20px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 12px;
  }
  .stat-card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; }
  .stat-card .value { font-size: 24px; font-weight: bold; margin-top: 4px; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red { color: var(--red); }
  .stat-card .value.yellow { color: var(--yellow); }
  .session-item {
    padding: 8px 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
    font-size: 12px;
  }
  .session-item:hover { background: rgba(88,166,255,0.08); }
  .session-item.active { background: rgba(88,166,255,0.15); border-color: var(--accent); }
  .session-item .id { color: var(--accent); font-weight: bold; }
  .session-item .intent { color: var(--muted); font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.created { background: var(--muted); }
  .status-dot.executing { background: var(--yellow); }
  .status-dot.completed { background: var(--green); }
  .status-dot.failed { background: var(--red); }
  .status-dot.checkpointing { background: var(--purple); }
  .timeline { position: relative; padding-left: 20px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }
  .timeline-event {
    position: relative;
    padding: 6px 0 6px 16px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .timeline-event::before {
    content: '';
    position: absolute;
    left: -16px;
    top: 10px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  .timeline-event .ts { color: var(--muted); font-size: 10px; }
  .timeline-event .type { color: var(--accent); }
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--muted); font-size: 11px; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  td { padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .progress-bar .fill { height: 100%; background: var(--accent); border-radius: 2px; }
</style>
</head>
<body>
<header>
  <h1>◈ Nexus Runtime</h1>
  <span class="badge">v1.0.0</span>
  <span style="flex:1"></span>
  <span id="clock" style="color:var(--muted)"></span>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="stat-card">
      <div class="label">Active Sessions</div>
      <div class="value green" id="stat-active">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Events</div>
      <div class="value" id="stat-events">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Cost Today</div>
      <div class="value yellow" id="stat-cost">$0.00</div>
    </div>
    <div class="stat-card">
      <div class="label">Entropy Score</div>
      <div class="value" id="stat-entropy">0.00</div>
      <div class="progress-bar"><div class="fill" id="entropy-bar" style="width:0%"></div></div>
    </div>
    <div style="margin-top:16px;">
      <div style="color:var(--muted); font-size:11px; margin-bottom:8px;">SESSIONS</div>
      <div id="session-list"></div>
    </div>
  </aside>
  <main class="main" id="main-content">
    <div class="empty-state">Select a session to inspect</div>
  </main>
</div>

<script>
const STATE = {
  sessions: [],
  selected: null,
  events: [],
};

function clock() {
  document.getElementById('clock').textContent = new Date().toISOString();
}

function initDemoData() {
  STATE.sessions = [
    {
      id: 'a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6',
      intent: 'refactor authentication to JWT',
      model: 'claude-3.5-sonnet',
      status: 'executing',
      checkpoint_seq: 12,
      budget: { consumed: 245, limit: 500 },
      created_at: Date.now() - 3600000,
    },
    {
      id: 'f6e5d4c3b2a1f0e9d8c7b6a5f4e3d2c1',
      intent: 'build CI/CD pipeline for microservices',
      model: 'claude-3.5-sonnet',
      status: 'completed',
      checkpoint_seq: 34,
      budget: { consumed: 480, limit: 500 },
      created_at: Date.now() - 86400000,
    },
    {
      id: '11112222333344445555666677778888',
      intent: 'migrate database from MySQL to PostgreSQL',
      model: 'gpt-4o',
      status: 'failed',
      checkpoint_seq: 8,
      budget: { consumed: 500, limit: 500 },
      created_at: Date.now() - 172800000,
    },
    {
      id: '99990000111122223333444455556666',
      intent: 'optimize React rendering performance',
      model: 'claude-3.5-sonnet',
      status: 'checkpointing',
      checkpoint_seq: 5,
      budget: { consumed: 120, limit: 300 },
      created_at: Date.now() - 7200000,
    },
  ];

  STATE.events = {
    'a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6': [
      { ts: Date.now()-3500000, type: 'intent_received', detail: 'User submitted intent via CLI' },
      { ts: Date.now()-3400000, type: 'intent_parsed', detail: 'Intent graph: 7 nodes' },
      { ts: Date.now()-3300000, type: 'plan_proposed', detail: 'Model: claude-3.5-sonnet, 4 steps' },
      { ts: Date.now()-3200000, type: 'plan_committed', detail: 'Frontier: 3 tasks ready' },
      { ts: Date.now()-3100000, type: 'dependencies_met', detail: 'All preconditions satisfied' },
      { ts: Date.now()-3000000, type: 'worker_dispatched', detail: 'Python worker assigned' },
      { ts: Date.now()-2900000, type: 'worker_checkpoint', detail: 'Step 3/34: reading auth module' },
      { ts: Date.now()-2800000, type: 'worker_checkpoint', detail: 'Step 7/34: analyzing JWT strategy' },
      { ts: Date.now()-2700000, type: 'worker_checkpoint', detail: 'Step 12/34: generating code' },
      { ts: Date.now()-100000, type: 'session_resumed', detail: 'Recovered from checkpoint 12' },
      { ts: Date.now()-50000, type: 'side_effect_intent', detail: 'PENDING: fs:write:/src/auth.py' },
    ],
  };

  updateStats();
  renderSessionList();
}

function updateStats() {
  document.getElementById('stat-active').textContent =
    STATE.sessions.filter(s => ['executing','checkpointing'].includes(s.status)).length;
  document.getElementById('stat-events').textContent =
    Object.values(STATE.events).reduce((sum, e) => sum + e.length, 0);
  const totalCost = STATE.sessions.reduce((s, c) => s + (c.budget?.consumed||0), 0);
  document.getElementById('stat-cost').textContent = `$${(totalCost/100).toFixed(2)}`;
  const entropy = (Math.random() * 0.3).toFixed(2);
  document.getElementById('stat-entropy').textContent = entropy;
  document.getElementById('entropy-bar').style.width = (entropy * 100) + '%';
}

function renderSessionList() {
  const list = document.getElementById('session-list');
  list.innerHTML = STATE.sessions.map(s => `
    <div class="session-item ${STATE.selected === s.id ? 'active' : ''}" onclick="selectSession('${s.id}')">
      <div>
        <span class="status-dot ${s.status}"></span>
        <span class="id">${s.id.slice(0,16)}...</span>
        <span style="float:right;color:var(--muted);font-size:10px">cp:${s.checkpoint_seq}</span>
      </div>
      <div class="intent">${s.intent}</div>
    </div>
  `).join('');
}

function selectSession(id) {
  STATE.selected = id;
  renderSessionList();
  const s = STATE.sessions.find(s => s.id === id);
  if (!s) return;

  const events = STATE.events[id] || [];
  const statusColor = {created:'muted',executing:'yellow',checkpointing:'purple',completed:'green','failed':'red'}[s.status] || 'muted';

  document.getElementById('main-content').innerHTML = `
    <div class="stat-card">
      <div class="label">Session</div>
      <div style="font-size:14px; word-break:break-all">${s.id}</div>
    </div>
    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px;">
      <div class="stat-card">
        <div class="label">Status</div>
        <div class="value ${statusColor}" style="font-size:16px">${s.status}</div>
      </div>
      <div class="stat-card">
        <div class="label">Checkpoint</div>
        <div class="value" style="font-size:16px">${s.checkpoint_seq}</div>
      </div>
      <div class="stat-card">
        <div class="label">Budget</div>
        <div class="value yellow" style="font-size:16px">$${(s.budget.consumed/100).toFixed(2)} / $${(s.budget.limit/100).toFixed(2)}</div>
        <div class="progress-bar"><div class="fill" style="width:${(s.budget.consumed/s.budget.limit*100)}%"></div></div>
      </div>
      <div class="stat-card">
        <div class="label">Model</div>
        <div class="value" style="font-size:16px">${s.model}</div>
      </div>
    </div>
    <div style="margin-bottom:8px;color:var(--muted)">EVENT TIMELINE (${events.length} events)</div>
    <div class="timeline">
      ${events.map(e => `
        <div class="timeline-event">
          <div class="ts">${new Date(e.ts).toLocaleTimeString()}</div>
          <div class="type">${e.type}</div>
          <div style="color:var(--muted)">${e.detail}</div>
        </div>
      `).join('')}
      ${events.length === 0 ? '<div class="empty-state">No events recorded</div>' : ''}
    </div>
  `;
}

setInterval(clock, 1000);
clock();
initDemoData();
</script>
</body>
</html>
